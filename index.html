<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>画像をPDFに変換・結合 - 写真PDFメーカー</title>
    <meta
      name="description"
      content="JPG、PNG、WebPなどの画像をブラウザ内で並べ替えてPDFに変換できる無料ツールです。写真やスキャン画像を端末内で処理してPDF保存できます。"
    />
    <meta name="robots" content="index,follow" />
    <meta name="application-name" content="写真PDFメーカー" />
    <meta name="theme-color" content="#157f78" />
    <link rel="canonical" href="https://meta1529-dev.github.io/photo-pdf-maker/" />
    <link rel="manifest" href="./site.webmanifest" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="ja_JP" />
    <meta property="og:site_name" content="写真PDFメーカー" />
    <meta property="og:title" content="画像をPDFに変換・結合 - 写真PDFメーカー" />
    <meta
      property="og:description"
      content="画像を追加して順番や向きを整え、ブラウザ内でPDFとして保存できます。"
    />
    <meta property="og:url" content="https://meta1529-dev.github.io/photo-pdf-maker/" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="画像をPDFに変換・結合 - 写真PDFメーカー" />
    <meta
      name="twitter:description"
      content="写真やスキャン画像をブラウザ内でPDFにまとめる無料ツールです。"
    />
    <link rel="stylesheet" href="./styles.css" />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "写真PDFメーカー",
        "alternateName": "Photo PDF Maker",
        "url": "https://meta1529-dev.github.io/photo-pdf-maker/",
        "applicationCategory": "UtilitiesApplication",
        "operatingSystem": "Any",
        "inLanguage": "ja",
        "isAccessibleForFree": true,
        "description": "JPG、PNG、WebPなどの画像をブラウザ内で並べ替えてPDFに変換できる無料ツールです。",
        "featureList": [
          "画像をPDFに変換",
          "複数画像の結合",
          "画像の並べ替え",
          "画像の回転",
          "A4 PDF作成"
        ]
      }
    </script>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <h1>画像PDFメーカー</h1>
          <p id="summary" class="summary">0枚</p>
        </div>
        <div class="top-actions">
          <button id="clearButton" class="icon-button muted" type="button" title="すべて削除" aria-label="すべて削除" disabled>
            <span aria-hidden="true">×</span>
          </button>
          <button id="addButton" class="primary-button" type="button">
            <span aria-hidden="true">＋</span>
            画像を追加
          </button>
          <input id="fileInput" type="file" accept="image/*" multiple hidden />
        </div>
      </header>

      <main class="workspace">
        <section id="dropZone" class="image-area" aria-label="画像リスト">
          <div id="emptyState" class="empty-state">
            <button id="emptyAddButton" class="empty-add" type="button">
              <span aria-hidden="true">＋</span>
              画像を追加
            </button>
          </div>
          <div id="imageGrid" class="image-grid" aria-live="polite"></div>
        </section>

        <aside class="settings-panel">
          <div class="panel-section">
            <label class="field-label" for="fileName">ファイル名</label>
            <input id="fileName" class="text-input" type="text" value="textbook.pdf" spellcheck="false" />
          </div>

          <div class="panel-section">
            <label class="field-label" for="pageSize">ページ</label>
            <select id="pageSize" class="select-input">
              <option value="a4-auto" selected>A4 自動</option>
              <option value="a4-portrait">A4 縦</option>
              <option value="a4-landscape">A4 横</option>
              <option value="image-fit">写真比率</option>
            </select>
          </div>

          <div class="panel-section">
            <label class="field-label" for="margin">余白</label>
            <select id="margin" class="select-input">
              <option value="0">0 mm</option>
              <option value="5" selected>5 mm</option>
              <option value="10">10 mm</option>
              <option value="15">15 mm</option>
            </select>
          </div>

          <div class="panel-section">
            <label class="field-label" for="fitMode">配置</label>
            <select id="fitMode" class="select-input">
              <option value="contain" selected>全体</option>
              <option value="cover">全面</option>
            </select>
          </div>

          <div class="panel-section">
            <div class="field-row">
              <label class="field-label" for="quality">画質</label>
              <span id="qualityValue" class="field-value">90%</span>
            </div>
            <input id="quality" class="slider" type="range" min="55" max="98" value="90" />
          </div>

          <div class="panel-section">
            <label class="field-label" for="maxEdge">解像度</label>
            <select id="maxEdge" class="select-input">
              <option value="1800">標準</option>
              <option value="2400" selected>高画質</option>
              <option value="3200">細部</option>
              <option value="0">原寸</option>
            </select>
          </div>

          <div class="selected-box">
            <p id="selectedName" class="selected-name">未選択</p>
            <p id="selectedMeta" class="selected-meta">画像を追加できます</p>
          </div>

          <button id="createPdfButton" class="create-button" type="button" disabled>
            <span aria-hidden="true">↓</span>
            PDFを作成
          </button>
          <p id="status" class="status" role="status">待機中</p>
        </aside>
      </main>
    </div>

    <section class="about-app" aria-labelledby="aboutTitle">
      <div class="about-inner">
        <h2 id="aboutTitle">画像をPDFにまとめる無料ブラウザツール</h2>
        <p>
          写真、スキャン画像、vFlat Scanなどで書き出した画像を選び、順番を整えてPDFとして保存できます。
          画像はサーバーへ送らず、ブラウザ内で処理します。
        </p>
      </div>
    </section>

    <script src="./app.js"></script>
  </body>
</html>
